name: Build Plugin Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: macOS (AU, VST3, Standalone)
            os: macos-14
            build_dir: plugin/build-ci-mac
            cmake_generator: Xcode
            artifact_name: TurboTuning-macOS
          - name: Windows (VST3, Standalone)
            os: windows-2022
            build_dir: plugin/build-ci-win
            cmake_generator: Visual Studio 17 2022
            artifact_name: TurboTuning-Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S plugin -B ${{ matrix.target.build_dir }} -G "${{ matrix.target.cmake_generator }}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S plugin -B ${{ matrix.target.build_dir }} -G "${{ matrix.target.cmake_generator }}" -A x64

      - name: Build Release
        run: cmake --build ${{ matrix.target.build_dir }} --config Release --parallel

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.target.build_dir }}/TurboTuning_artefacts/Release/AU" dist/TurboTuning-macOS-AU.zip
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.target.build_dir }}/TurboTuning_artefacts/Release/VST3" dist/TurboTuning-macOS-VST3.zip
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.target.build_dir }}/TurboTuning_artefacts/Release/Standalone" dist/TurboTuning-macOS-Standalone.zip

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ matrix.target.build_dir }}/TurboTuning_artefacts/Release/VST3/*" -DestinationPath "dist/TurboTuning-Windows-VST3.zip" -Force
          Compress-Archive -Path "${{ matrix.target.build_dir }}/TurboTuning_artefacts/Release/Standalone/*" -DestinationPath "dist/TurboTuning-Windows-Standalone.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          if-no-files-found: error
          path: dist/*.zip
