name: Build Plugin Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-macos:
    name: Build macOS (AU, VST3, Standalone)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake + Xcode)
        run: cmake -S plugin -B plugin/build-ci-mac -G Xcode

      - name: Build Release
        run: cmake --build plugin/build-ci-mac --config Release --parallel

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TurboTuning-macOS
          if-no-files-found: error
          path: |
            plugin/build-ci-mac/TurboTuning_artefacts/Release/AU/*.component
            plugin/build-ci-mac/TurboTuning_artefacts/Release/VST3/*.vst3
            plugin/build-ci-mac/TurboTuning_artefacts/Release/Standalone/*.app

  build-windows:
    name: Build Windows (VST3, Standalone)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake + VS2022)
        run: cmake -S plugin -B plugin/build-ci-win -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build plugin/build-ci-win --config Release --parallel

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TurboTuning-Windows
          if-no-files-found: error
          path: |
            plugin/build-ci-win/TurboTuning_artefacts/Release/VST3/*.vst3
            plugin/build-ci-win/TurboTuning_artefacts/Release/Standalone/*.exe
